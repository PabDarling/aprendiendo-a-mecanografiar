<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <title>Document</title>
</head>

<body>

    <div id="mensaje-final" class="mensaje-final"></div>
    <div id="pantalla" class="letra-color"></div>
    <div id="texto_completado"></div>
    <div class="contenedor">
        <div id="countdown" class="contador">00:00</div>
        <div id="puntos" class="puntaje">0</div>
    </div>

    <div class="keyboard">
        <div class="row">
            <div class="key q-color" data-key="81">Q</div>
            <div class="key w-color" data-key="87">W</div>
            <div class="key e-color" data-key="69">E</div>
            <div class="key r-color" data-key="82">R</div>
            <div class="key y-color" data-key="84">T</div>
            <div class="key y-color" data-key="89">Y</div>
            <div class="key u-color" data-key="85">U</div>
            <div class="key i-color" data-key="73">I</div>
            <div class="key o-color" data-key="79">O</div>
            <div class="key o-color" data-key="80">P</div>
        </div>
        <div class="row">
            <div class="key q-color" data-key="65">A</div>
            <div class="key w-color" data-key="83">S</div>
            <div class="key e-color" data-key="68">D</div>
            <div class="key r-color" data-key="70">F</div>
            <div class="key y-color" data-key="71">G</div>
            <div class="key y-color" data-key="72">H</div>
            <div class="key u-color" data-key="74">J</div>
            <div class="key i-color" data-key="75">K</div>
            <div class="key o-color" data-key="76">L</div>
        </div>
        <div class="row">
            <div class="key q-color" data-key="90">Z</div>
            <div class="key w-color" data-key="88">X</div>
            <div class="key e-color" data-key="67">C</div>
            <div class="key r-color" data-key="86">V</div>
            <div class="key y-color" data-key="66">B</div>
            <div class="key y-color" data-key="78">N</div>
            <div class="key u-color" data-key="77">M</div>
        </div>
        <div class="row">
            <div class="key q-color" data-key="17" class="special">Ctrl</div>
            <div class="key w-color" data-key="18" class="special">Alt</div>
            <div class="key P-color" data-key="32" id="space">Space</div>
            <div class="key o-color" data-key="18" class="special">Alt</div>

        </div>

    </div>


    <div class="hands-container">
        <img src="img/manoscolor.png" alt="guia de manos" class="hands-image">

        <div class="fingerHighlights">
            <div id="finger-q" class="finger-light"></div>
            <div id="finger-w" class="finger-light"></div>
            <div id="finger-e" class="finger-light"></div>
            <div id="finger-r" class="finger-light"></div>
            <div id="finger-y" class="finger-light"></div>
            <div id="finger-u" class="finger-light"></div>
            <div id="finger-i" class="finger-light"></div>
            <div id="finger-o" class="finger-light"></div>
        </div>
    </div>



    <script src="js/tiempo.js"></script>
    <script src="js/points.js"></script>
    <script src="js/tutorial-links.js"></script>


</body>

</html>
